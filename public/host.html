<!-- host.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Become a Host — Travfica</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <div class="logo"><img src="images/Travificalogo.jpg.png" alt="Travfica Logo"></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="rooms.html">Rooms</a>
      <a href="host.html">Become a Host</a>
    </nav>
  </header>

  <section class="host-form">
    <h2>Become a Host</h2>
    <p>List your property on Travfica and reach thousands of travelers.</p>
    <form action="mailto:hello@travfica.com" method="post" enctype="text/plain">
      <label>Full Name</label>
      <input type="text" name="name" required>
      <label>Email</label>
      <input type="email" name="email" required>
      <label>Property Name</label>
      <input type="text" name="property" required>
      <label>Location</label>
      <input type="text" name="location" required>
      <label>Price per Night (ZAR)</label>
      <input type="number" name="price" required>
      <label>Description</label>
      <textarea name="description" rows="4" required></textarea>
      <button type="submit" class="btn">Submit Request</button>
    </form>
  </section>

  <footer>
    <div class="footer-bottom">© 2026 Travfica · Travel Safe. Travel Smart.</div>
  </footer>
</body>
</html>
